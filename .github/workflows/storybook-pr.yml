name: 'Storybook pull request'

on:
  pull_request:
    branches: [master]
    paths:
      - 'apps/**/*.stories.*'
      - 'packages/**/*.stories.*'
      - '.storybook/**'
      - 'packages/ui/**'
      - '.github/workflows/storybook-pr.yml'
      - 'pnpm-lock.yaml'
      - package.json
      - .npmrc

env:
  NODE_OPTIONS: --max-old-space-size=4096

permissions:
  pull-requests: write

jobs:
  build-storybook:
    runs-on: ubuntu-24.04
    environment:
      name: storybook-pr
      url: ${{ steps.chromatic.outputs.storybookUrl }}

    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: ./.github/actions/prepare-nodejs
        name: Prepare Node.js

      - name: Run Chromatic
        id: chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        env:
          CHROMATIC_BRANCH: ${{ github.event.pull_request.head.ref }}
          CHROMATIC_SHA: ${{ github.event.pull_request.head.sha }}
          CHROMATIC_SLUG: ${{ github.repository }}

      - name: Post Storybook link
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## Storybook',
                '',
                `- 📚 [Preview Storybook](${{ steps.chromatic.outputs.storybookUrl }})`,
                `- 🔍 [Chromatic build](${{ steps.chromatic.outputs.buildUrl }})`,
              ].join('\n')
            })
