name: 'Format and linter check'

on:
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@main

      - uses: ./.github/actions/prepare-nodejs
        name: Prepare Node.js

      - name: Check formatting
        run: pnpm fmt:check

      - name: Check linting
        run: pnpm lint:check
